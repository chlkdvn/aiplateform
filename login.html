<script>
    const API_BASE_URL = 'http://localhost:4000';
    
    // DOM Elements
    const googleBtn = document.getElementById('googleLoginBtn');
    const btnIcon = document.getElementById('btnIcon');
    const btnText = document.getElementById('btnText');
    const btnLoading = document.getElementById('btnLoading');
    const statusMessage = document.getElementById('statusMessage');

    // Show loading state
    function setLoading(isLoading) {
        if (isLoading) {
            googleBtn.disabled = true;
            btnIcon.classList.add('hidden');
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');
            googleBtn.classList.add('opacity-75', 'cursor-not-allowed');
        } else {
            googleBtn.disabled = false;
            btnIcon.classList.remove('hidden');
            btnText.classList.remove('hidden');
            btnLoading.classList.add('hidden');
            googleBtn.classList.remove('opacity-75', 'cursor-not-allowed');
        }
    }

    // Show status message
    function showStatus(message, isError = false) {
        statusMessage.textContent = message;
        statusMessage.className = `text-center text-sm font-medium ${isError ? 'text-error' : 'text-secondary'}`;
        statusMessage.classList.remove('hidden');
    }

    // Handle Google Login using popup
    function handleGoogleLogin() {
        setLoading(true);
        showStatus('Opening Google Sign In...');
        
        // Calculate popup position (center of screen)
        const width = 500;
        const height = 600;
        const left = (window.screen.width - width) / 2;
        const top = (window.screen.height - height) / 2;
        
        // Open popup for Google OAuth
        const popup = window.open(
            `${API_BASE_URL}/auth/google`,
            'Google Sign In',
            `width=${width},height=${height},left=${left},top=${top},toolbar=no,menubar=no,scrollbars=yes`
        );
        
        // Check if popup was blocked
        if (!popup || popup.closed || typeof popup.closed === 'undefined') {
            setLoading(false);
            showStatus('Popup blocked! Please allow popups for this site.', true);
            return;
        }
        
        // Listen for messages from popup
        window.addEventListener('message', handlePopupMessage);
        
        // Also check periodically if popup is closed manually
        const checkClosed = setInterval(() => {
            if (popup.closed) {
                clearInterval(checkClosed);
                window.removeEventListener('message', handlePopupMessage);
                // Only reset if we're not already processing success
                if (btnText.classList.contains('hidden')) {
                    setLoading(false);
                    showStatus('Sign in cancelled', true);
                }
            }
        }, 500);
    }

    // Handle message from popup window
    function handlePopupMessage(event) {
        // Check if this is our auth message
        if (event.data && event.data.type === 'GOOGLE_AUTH_SUCCESS') {
            // Remove event listener
            window.removeEventListener('message', handlePopupMessage);
            
            if (event.data.success) {
                console.log('Login success:', event.data);
                
                // 🔥 REDIRECT LOGIC BASED ON ONBOARDING STATUS
                if (event.data.onboardingCompleted) {
                    // Onboarding done → Dashboard
                    showStatus('Success! Redirecting to dashboard...');
                    setTimeout(() => {
                        window.location.href = 'http://localhost:5500/user-dashboard/dashboard.html';
                    }, 800);
                } else {
                    // Onboarding not done → Onboarding page
                    showStatus('Success! Redirecting to onboarding...');
                    setTimeout(() => {
                        window.location.href = 'http://localhost:5500/onboarding_1.html';
                    }, 800);
                }
            } else {
                setLoading(false);
                showStatus(event.data.error || 'Authentication failed', true);
            }
        }
    }

    // Check if already logged in on page load
    async function checkExistingAuth() {
        try {
            const response = await fetch(`${API_BASE_URL}/auth/me`, {
                credentials: 'include'
            });
            const data = await response.json();
            
            if (data.loggedIn && data.user) {
                // Already logged in, redirect based on onboarding
                if (data.user.onboarding?.isCompleted) {
                    window.location.href = 'http://localhost:5500/user-dashboard/dashboard.html';
                } else {
                    window.location.href = 'http://localhost:5500/onboarding_1.html';
                }
            }
        } catch (error) {
            console.log('Not logged in');
        }
    }

    // Check auth on page load
    checkExistingAuth();
</script>
